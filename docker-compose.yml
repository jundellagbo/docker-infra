services:
  # Wildcard DNS for all *.dev.local hosts inside the Docker network
  dnsmasq:
    build:
      context: ./docker/dnsmasq
      dockerfile: Dockerfile
    container_name: infra-dnsmasq
    healthcheck:
      test: ["CMD-SHELL", "nslookup health.dev.local 127.0.0.1 | grep -q 172.28.0.10"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      infra-network:
        ipv4_address: 172.28.0.53
    restart: unless-stopped

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: infra-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_PATH:-./nginx}:/etc/nginx/custom:ro
      - ./docker/nginx/automatic-vhosts.conf:/etc/nginx/conf.d/00-automatic-vhosts.conf:ro
      - ${WWW_PATH:-./www}:/var/www
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      dnsmasq:
        condition: service_healthy
      php:
        condition: service_started
      apache:
        condition: service_started
    dns:
      - 172.28.0.53
    healthcheck:
      test: ["CMD-SHELL", "wget --header='Host: health.dev.local' -qO /dev/null http://127.0.0.1/__health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      infra-network:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  # Apache - Backend Web Server
  apache:
    build:
      context: ./docker/apache
      dockerfile: Dockerfile
    container_name: infra-apache
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ${WWW_PATH:-./www}:/var/www/html
      - ./docker/apache/vhosts:/etc/apache2/sites-enabled
      - ./ssl:/etc/apache2/ssl:ro
    depends_on:
      - php
    dns:
      - 172.28.0.53
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - infra-network
    restart: unless-stopped

  # PHP-FPM with Composer and WP-CLI
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: infra-php
    dns:
      - 172.28.0.53
    volumes:
      - ${WWW_PATH:-./www}:/var/www
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 9000); exit($$socket ? 0 : 1);'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - infra-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: infra-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    dns:
      - 172.28.0.53
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "--password=${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra-network
    restart: unless-stopped

  # PostgreSQL Database
  postgresql:
    image: postgres:16-alpine
    container_name: infra-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    dns:
      - 172.28.0.53
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./postgresql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infra-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: infra-redis
    dns:
      - 172.28.0.53
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - infra-network
    restart: unless-stopped

  # Adminer - Database Management
  adminer:
    image: adminer:latest
    container_name: infra-adminer
    ports:
      - "8081:8080"
    volumes:
      - ./docker/adminer/.user.ini:/usr/local/etc/php/conf.d/zz-user.ini:ro
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: nette
    dns:
      - 172.28.0.53
    depends_on:
      - mysql
      - postgresql
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - infra-network
    restart: unless-stopped

  # MailHog - Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: infra-mailhog
    dns:
      - 172.28.0.53
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8025/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - infra-network
    restart: unless-stopped

  # Nginx Config Watcher - Auto-sync configs
  config-watcher:
    image: alpine:latest
    container_name: infra-config-watcher
    dns:
      - 172.28.0.53
    volumes:
      - ${NGINX_PATH:-./nginx}:/watch/nginx
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "
        apk add --no-cache inotify-tools docker-cli &&
        echo 'Starting nginx config watcher...' &&
        while true; do
          inotifywait -r -e modify,create,delete,move /watch/nginx 2>/dev/null &&
          echo 'Config change detected, reloading nginx...' &&
          docker exec infra-nginx nginx -s reload 2>/dev/null || true
        done
      "
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD-SHELL", "pidof inotifywait || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - infra-network
    restart: unless-stopped

networks:
  infra-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  mysql-data:
    name: infra_mysql-data
  postgresql-data:
    name: infra_postgresql-data
  redis-data:
    name: infra_redis-data
