resolver 127.0.0.11 valid=10s ipv6=off;

upstream php {
    zone php 64k;
    server php:9000 resolve;
}

include /etc/nginx/custom/*.conf;

# Explicit server_name entries take precedence over this regex vhost.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ~^(?<project_domain>[a-z0-9][a-z0-9-]*\.dev\.local)$;
    client_max_body_size 100M;

    root /var/www/$project_domain/public;
    index index.html index.htm index.php;

    location = /__health {
        access_log off;
        return 204;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_index index.php;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name ~^(?<project_domain>[a-z0-9][a-z0-9-]*\.dev\.local)$;
    client_max_body_size 100M;

    ssl_certificate /etc/nginx/ssl/wildcard.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/$project_domain/public;
    index index.html index.htm index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_index index.php;
    }

    location ~ /\.ht {
        deny all;
    }
}
