resolver 127.0.0.11 valid=10s ipv6=off;

upstream apache_backend {
    zone apache 64k;
    server apache:80 resolve;
}

include /etc/nginx/custom/*.conf;

# Explicit server_name entries take precedence over this regex vhost.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ~^(?<project_domain>[a-z0-9][a-z0-9-]*\.dev\.local)$;
    client_max_body_size 100M;

    root /var/www/$project_domain/public;
    index index.html index.htm index.php;

    location = /__health {
        access_log off;
        return 204;
    }

    location / {
        proxy_pass http://apache_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name ~^(?<project_domain>[a-z0-9][a-z0-9-]*\.dev\.local)$;
    client_max_body_size 100M;

    ssl_certificate /etc/nginx/ssl/wildcard.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/$project_domain/public;
    index index.html index.htm index.php;

    location / {
        proxy_pass http://apache_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ~ /\.ht {
        deny all;
    }
}
